<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A biography on John Stratford</title>
  <link rel="stylesheet" href="/css/styles.css">
  <meta name="description" content="A short biography of John Stratford - placeholder text">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>John Stratford</h1>
      <p class="subtitle">A biography of their life and work</p>
    </div>
  </header>

  <main class="container main-grid">
    <!-- Each .entry is one 'screenful' on small screens.
         On wide screens the grid lays them out two-up -->
    <article class="entry">
      <figure>
        <img src="/images/photo1.jpg" alt="[short alt text]">
        <figcaption>Early lif</figcaption>
      </figure>
      <div class="entry-body">
        <h2>Early life</h2>
        <p>Paragraph 1...</p>
        <p>Paragraph 2...</p>
      </div>
    </article>

    <article class="entry">
      <figure>
        <img src="/images/photo2.jpg" alt="[short alt text]">
        <figcaption>Mid-point [year]</figcaption>
      </figure>
      <div class="entry-body">
        <h2>Header 2</h2>
        <p>Text that continues...</p>
      </div>
    </article>

    <!-- Repeat .entry blocks for as many 'pages' as you want -->
    <article class="entry">
      <figure>
        <img src="/images/photo3.jpg" alt="[short alt text]">
        <figcaption>Caption text</figcaption>
      </figure>
      <div class="entry-body">
        <h2>Header 2</h2>
        <p>More content...</p>
      </div>
    </article>

    <article class="entry">
      <figure>
        <img src="/images/photo4.jpg" alt="[short alt text]">
        <figcaption>Caption text</figcaption>
      </figure>
      <div class="entry-body">
        <h2>Header 2</h2>
        <p>Closing paragraph</p>
      </div>
    </article>

  </main>
</body>
</html>
